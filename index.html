<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bitcoin Runner Fixed</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; 
            background-color: #f0f0f0; 
            font-family: Arial, sans-serif; 
            overflow: hidden;
            touch-action: manipulation;
        }
        canvas { 
            background-color: #fff; 
            border-bottom: 4px solid #F7931A;
            max-width: 95%;
            height: auto;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.1);
        }
        .ui { margin-bottom: 10px; color: #333; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>

    <div class="ui">Puntos: <span id="scoreVal">0</span></div>
    <canvas id="gameCanvas"></canvas>
    <p style="color: #888; font-size: 14px; margin-top: 10px;">Toca la pantalla para saltar</p>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreVal = document.getElementById('scoreVal');

    canvas.width = 600;
    canvas.height = 250;

    let score = 0;
    let gameSpeed = 6;
    let isGameOver = false;
    let animationId;
    let obstacleTimeout; // Para controlar el ciclo de generación

    const btc = {
        x: 50,
        y: 180,
        radius: 25,
        dy: 0,
        jumpForce: 13,
        gravity: 0.7,
        grounded: false,
        draw() {
            ctx.beginPath();
            ctx.arc(this.x + this.radius, this.y + this.radius, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#F7931A";
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.font = "bold 30px Arial";
            ctx.textAlign = "center";
            ctx.fillText("₿", this.x + this.radius, this.y + this.radius + 10);
            ctx.closePath();
        }
    };

    let obstacles = [];

    function startObstacleCycle() {
        // Limpiamos cualquier timeout previo para evitar duplicados
        clearTimeout(obstacleTimeout);
        
        function spawn() {
            if (isGameOver) return;
            
            let height = 30 + Math.random() * 40;
            obstacles.push({
                x: canvas.width,
                y: canvas.height - height,
                width: 25,
                height: height
            });
            
            // Tiempo aleatorio entre obstáculos
            let nextSpawn = 1000 + Math.random() * 1500;
            obstacleTimeout = setTimeout(spawn, nextSpawn);
        }
        
        spawn();
    }

    function drawObstacles() {
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            obs.x -= gameSpeed;
            
            ctx.fillStyle = "#2d5a27";
            ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

            // Colisión
            if (btc.x + 10 < obs.x + obs.width && 
                btc.x + (btc.radius * 2) - 10 > obs.x &&
                btc.y + (btc.radius * 2) > obs.y) {
                gameOver();
            }

            // Puntuación y limpieza
            if (obs.x + obs.width < 0) {
                obstacles.splice(i, 1);
                score++;
                scoreVal.innerText = score;
                if (score % 5 === 0) gameSpeed += 0.3;
            }
        }
    }

    function update() {
        if (isGameOver) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        btc.dy += btc.gravity;
        btc.y += btc.dy;

        if (btc.y + btc.radius * 2 > canvas.height) {
            btc.y = canvas.height - btc.radius * 2;
            btc.dy = 0;
            btc.grounded = true;
        }

        btc.draw();
        drawObstacles();

        animationId = requestAnimationFrame(update);
    }

    function jump(e) {
        if (e && e.type === 'touchstart') e.preventDefault();
        
        if (isGameOver) {
            restartGame();
            return;
        }

        if (btc.grounded) {
            btc.dy = -btc.jumpForce;
            btc.grounded = false;
        }
    }

    function gameOver() {
        isGameOver = true;
        clearTimeout(obstacleTimeout);
        cancelAnimationFrame(animationId);
        
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        ctx.font = "bold 25px Arial";
        ctx.fillText("HODL FALLIDO", canvas.width/2, canvas.height/2 - 10);
        ctx.font = "18px Arial";
        ctx.fillText("Toca para reintentar", canvas.width/2, canvas.height/2 + 30);
    }

    function restartGame() {
        score = 0;
        scoreVal.innerText = score;
        obstacles = [];
        gameSpeed = 6;
        isGameOver = false;
        btc.y = 180;
        btc.dy = 0;
        
        startObstacleCycle(); // Reiniciamos el ciclo de obstáculos
        update(); // Reiniciamos la animación
    }

    window.addEventListener('touchstart', jump, {passive: false});
    window.addEventListener('mousedown', jump);
    window.addEventListener('keydown', (e) => { if (e.code === 'Space') jump(); });

    // Inicio por primera vez
    startObstacleCycle();
    update();
</script>
</body>
</html>
